default:
  module: src.server.tasks.medagentbench.MedAgentBench
  parameters:
    concurrency: 10
    max_round: 8
    fhir_api_base: "http://localhost:8080/fhir/"

# Baseline: original behavior, no skills
medagentbench-std:
  parameters:
    name: medagentbench-std
    data_file: "data/medagentbench/test_data_v2.json"
    func_file: "data/medagentbench/funcs_v1.json"

# Skill-learning variant used by skill_cycle
medagentbench-skill:
  parameters:
    name: medagentbench-skill
    concurrency: 5
    data_file: "data/medagentbench/test_data_v2.json"
    func_file: "data/medagentbench/funcs_v1.json"
