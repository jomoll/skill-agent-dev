output_dir: "outputs/skill_cycle_local"

# Agent using local vLLM endpoint (LiteLLM proxy, OpenAI-compatible)
agent:
  module: src.client.agents.HTTPAgent
  parameters:
    url: "http://10.32.16.43:4000/chat/completions"
    headers:
      Authorization: "Bearer sk--jYBY-YIx5jNQqR0LPgqdQ"
      Content-Type: "application/json"
    body:
      model: "gpt-oss-120b"
      temperature: 0.2
      max_tokens: 8192
    return_format: "{response[choices][0][message][content]}"
    prompter:
      name: role_content_dict
      args:
        agent_role: "assistant"

# Task worker (must be running before starting this script)
# Start with: python -m src.start_task -a --config configs/start_task.yaml
task:
  name: "medagentbench-skill"
  controller_address: "http://localhost:5050/api"
  fhir_api_base: "http://localhost:8080/fhir/"

# Data splits produced by data/medagentbench/split_dataset.py
data:
  full: "data/medagentbench/test_data_v2.json"
  dev:  "data/medagentbench/split_dev.json"
  val:  "data/medagentbench/split_val.json"

# Skill library
skills:
  base_dir: "skills/base"

# Training loop hyperparameters
cycle:
  epochs: 5
  update_every: 30      # batch size per skill update cycle
  batch_concurrency: 5  # parallel samples within a batch (must be <= task worker concurrency)
  max_proposals: 1      # one change per proposal (best-of-K grouped proposal ranking selects the winner)
  max_learned_skills: 10
  grpo_k: 4             # number of candidate proposals to sample per update
  grpo_eval_n: 20       # probe set size for grouped proposal ranking: grpo_eval_n/2 failing + grpo_eval_n/2 passing
  run_baseline: true    # set to true to run a silent val eval before epoch 0
  proposal_temperature: 0.8  # high temperature for diverse skill proposals (separate from agent temperature)
